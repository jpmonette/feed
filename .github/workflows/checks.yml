name: Checks

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          cache: 'pnpm'
      - run: pnpm install
      - name: Lint
        run: pnpm lint
      - name: Format check
        run: pnpm format
      - name: Type check
        run: pnpm build
      - name: Test
        run: pnpm test
